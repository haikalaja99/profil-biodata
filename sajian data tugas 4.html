            position: relative;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: 0;
            border-radius: 8px;
        }

            padding: 25px 0;
            background: #2c3e50;
            color: white;
            margin-top: auto;

            }
            
            nav {

            }

            nav a {

                font-size: 0.9rem;
