<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video | MP4 Content</title>
    <style>
        /* Reset Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* Navigasi Modern */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: flex-end;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
        }

        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        /* Header Title */
        .header-title {
            padding: 140px 50px 60px;
            text-align: left;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-title h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            border-left: 8px solid #ff4d4d;
            padding-left: 20px;
        }

        /* Split Section */
        .split-video-section {
            display: flex;
            min-height: 80vh;
            width: 100%;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }

        /* Sisi Kiri: Native Video Player */
        .video-box {
            flex: 1.5;
            min-width: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Video memenuhi area secara estetis */
            outline: none;
        }

        /* Sisi Kanan: Info Deskripsi */
        .video-info {
            flex: 1;
            min-width: 400px;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fff;
        }

        .video-info span {
            color: #ff4d4d;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .video-info h2 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .video-info p {
            color: #555;
            font-size: 1.05rem;
            margin-bottom: 30px;
        }

        /* Footer */
        footer {
            padding: 60px 50px;
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 1px;
            border-top: 1px solid #f0f0f0;
        }

        /* Mobile Responsive */
        @media (max-width: 992px) {
            .video-info {
                padding: 40px 30px;
                min-width: 100%;
            }
            .video-box {
                min-width: 100%;
                height: 50vh;
            }
            .header-title h1 {
                font-size: 2.5rem;
            }
            nav {
                padding: 20px;
                justify-content: center;
            }
            nav a {
                margin: 0 10px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="header-title">
        <h1>Motion <br> Archive.</h1>
    </div>

    <div class="split-video-section">
        <div class="video-box">
            <video controls poster="video 1.mp4">
                <source src="video 1 mp4" type="video 1 mp4">
                Maaf, browser Anda tidak mendukung pemutar video MP4.
            </video>
        </div>

        <div class="video-info">
            <span>Video Dokumentasi</span>
            
            <p style="font-size: 0.85rem; color: #888;">
                *Pastikan file .mp4 Anda sudah di-upload ke repository yang sama dengan file HTML ini.
            </p>
        </div>
    </div>

    <footer>
        &copy; 2026 [Muhammad Fikri Haikal]. Tugas Sistem Informasi Manajemen Perikanan.
    </footer>

</body>
</html>
