<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Sederhana Google Sheets</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { padding: 8px; width: 300px; }
        button { padding: 10px 20px; background: blue; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Test Input Data</h2>
    
    <form id="formUjiCoba">
        <div class="form-group">
            <label>Nama Lengkap:</label><br>
            <input type="text" name="nama" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label><br>
            <input type="email" name="email" required>
        </div>
        
        <button type="submit" id="tombolKirim">Kirim Data</button>
    </form>

    <script>
        // GANTI DENGAN URL WEB APP ANDA
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysU5Y3Mq17RUE1omNY-15OeOuIL_x4KSMycOj2hF3w-sQZjQqcxDUim3CMo8bwVfZC/exec'; 
        const form = document.getElementById('formUjiCoba');
        const tombol = document.getElementById('tombolKirim');

        form.addEventListener('submit', e => {
            e.preventDefault(); // Mencegah halaman reload
            
            tombol.innerHTML = "Mengirim...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert("Yey! Data berhasil masuk ke Spreadsheet.");
                    form.reset();
                    tombol.innerHTML = "Kirim Data";
                })
                .catch(error => {
                    alert("Gagal mengirim data.");
                    console.error('Error:', error);
                    tombol.innerHTML = "Kirim Data";
                });
        });
    </script>

</body>
</html>
