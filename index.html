<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Input Data Keuangan</title>
    <style>
        /* --- PENGATURAN TAMPILAN (CSS) --- */
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --bg: #ecf0f1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: var(--primary);
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        fieldset {
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fcfcfc;
        }
        legend {
            font-weight: bold;
            color: var(--secondary);
            background: white;
            padding: 5px 15px;
            border: 1px solid #bdc3c7;
            border-radius: 20px;
        }
        .form-group { margin-bottom: 15px; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        
        /* Desain Khusus Tombol Jenis Transaksi */
        .btn-group { display: flex; gap: 10px; }
        .btn-group input[type="radio"] { display: none; }
        .btn-group label {
            flex: 1;
            text-align: center;
            padding: 12px;
            border: 2px solid var(--secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--secondary);
        }
        .btn-group input[type="radio"]:checked + label {
            background: var(--secondary);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Tombol Submit */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #1a252f; }
        .btn-submit:disabled { background: #95a5a6; cursor: wait; }

        @media (max-width: 600px) { .row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Formulir Pendataan Terpadu</h2>
    <form id="dataForm">
        
        <fieldset>
            <legend>1. Data Demografi</legend>
            <div class="form-group">
                <label>Nama Pengguna</label>
                <input type="text" name="nama" required placeholder="Nama lengkap sesuai KTP">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date" name="tanggal_lahir" required>
                </div>
                <div class="form-group">
                    <label>No. Telepon / WhatsApp</label>
                    <input type="tel" name="telepon" required placeholder="08...">
                </div>
            </div>
            <div class="form-group">
                <label>Alamat Email</label>
                <input type="email" name="email" required placeholder="contoh@email.com">
            </div>
            <div class="form-group">
                <label>Alamat Domisili</label>
                <textarea name="alamat" rows="2" required placeholder="Jalan, RT/RW, Kota"></textarea>
            </div>
            <div class="form-group">
                <label>Pendidikan Terakhir</label>
                <input list="pendidikan-list" name="pendidikan" required placeholder="Ketik atau pilih...">
                <datalist id="pendidikan-list">
                    <option value="SD/Sederajat">
                    <option value="SMP/Sederajat">
                    <option value="SMA/SMK/Sederajat">
                    <option value="Diploma (D1-D4)">
                    <option value="Sarjana (S1)">
                    <option value="Magister (S2)">
                    <option value="Doktor (S3)">
                </datalist>
            </div>
        </fieldset>

        <fieldset>
            <legend>2. Data Bank</legend>
            <div class="row">
                <div class="form-group">
                    <label>Nama Bank</label>
                    <input list="bank-list" name="nama_bank" required placeholder="Cari nama bank...">
                    <datalist id="bank-list">
                        <option value="Bank BCA">
                        <option value="Bank Mandiri">
                        <option value="Bank BNI">
                        <option value="Bank BRI">
                        <option value="Bank BSI">
                        <option value="Bank Kalsel">
                    </datalist>
                </div>
                <div class="form-group">
                    <label>Nomor Rekening</label>
                    <input type="number" name="no_rekening" required placeholder="Hanya angka">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>3. Data Transaksi Keuangan</legend>
            <div class="form-group">
                <label>Tanggal Transaksi</label>
                <input type="date" name="tanggal_transaksi" required>
            </div>
            <div class="form-group">
                <label>Uraian Transaksi</label>
                <input type="text" name="uraian" required placeholder="Contoh: Beli perlengkapan, Bayar sewa">
            </div>
            <div class="form-group">
                <label>Jenis Transaksi</label>
                <div class="btn-group">
                    <input type="radio" id="debet" name="jenis_transaksi" value="Debet (Masuk)" required>
                    <label for="debet">Debet (Pemasukan)</label>
                    
                    <input type="radio" id="kredit" name="jenis_transaksi" value="Kredit (Keluar)">
                    <label for="kredit">Kredit (Pengeluaran)</label>
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Nominal Debet (Rp)</label>
                    <input type="number" name="nominal_debet" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Nominal Kredit (Rp)</label>
                    <input type="number" name="nominal_kredit" value="0" min="0">
                </div>
            </div>
        </fieldset>

        <button type="submit" class="btn-submit" id="btnKirim">Simpan Data ke Google Sheets</button>
    </form>
</div>

<script>
    // PASTE URL WEB APP ANDA DI ANTARA TANDA KUTIP DI BAWAH INI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzqEimDQXbuJiTrBG-pVbm8ntMgJZI8qVhWyUQxReU6XuilcZ69QM9EqhBzmWFeiT4a/exec';
    
    const form = document.getElementById('dataForm');
    const btnKirim = document.getElementById('btnKirim');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Cek jika URL belum diganti
        if(scriptURL === 'URL_APPS_SCRIPT_ANDA_DISINI') {
            alert('PERHATIAN: Anda belum memasukkan URL Google Apps Script di file HTML!');
            return;
        }

        btnKirim.disabled = true;
        btnKirim.innerHTML = "Sedang Mengirim Data...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("Berhasil! Data telah terkirim ke Google Sheets.");
                form.reset(); // Mengosongkan form
                btnKirim.disabled = false;
                btnKirim.innerHTML = "Simpan Data ke Google Sheets";
            })
            .catch(error => {
                alert("Gagal mengirim data. Pastikan izin akses web app diset ke 'Siapa saja' (Anyone).");
                console.error('Error:', error.message);
                btnKirim.disabled = false;
                btnKirim.innerHTML = "Coba Lagi";
            });
    });
</script>

</body>
</html>
