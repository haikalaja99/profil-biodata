<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Input Data Keuangan</title>
    <style>
        /* === DESAIN CSS === */
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fafafa;
        }

        legend {
            font-weight: bold;
            color: var(--primary-color);
            background: #fff;
            padding: 0 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* Trik Desain Tombol Radio untuk Jenis Transaksi */
        .radio-buttons {
            display: flex;
            gap: 10px;
        }

        .radio-buttons input[type="radio"] {
            display: none; /* Sembunyikan bulatan radio asli */
        }

        .radio-buttons label {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 2px solid var(--primary-color);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            background: #fff;
            color: var(--primary-color);
            font-weight: bold;
            margin: 0;
        }

        .radio-buttons input[type="radio"]:checked + label {
            background-color: var(--primary-color);
            color: #fff;
        }

        button.submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button.submit-btn:hover {
            background-color: #004494;
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Formulir Pengumpulan Data</h2>
    <form id="dataForm">
        
        <fieldset>
            <legend>Data Demografi</legend>
            <div class="form-group">
                <label>Nama Pengguna</label>
                <input type="text" name="nama" required placeholder="Masukkan nama lengkap">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date" name="tgl_lahir" required>
                </div>
                <div class="form-group">
                    <label>No. Telepon</label>
                    <input type="tel" name="telepon" required placeholder="Contoh: 081234567890">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="email@contoh.com">
            </div>

            <div class="form-group">
                <label>Alamat Lengkap</label>
                <textarea name="alamat" rows="3" required placeholder="Masukkan alamat lengkap"></textarea>
            </div>

            <div class="form-group">
                <label>Tingkat Pendidikan (Ketik untuk mencari atau pilih)</label>
                <input list="pendidikan-list" name="pendidikan" required placeholder="Pilih atau ketik pendidikan">
                <datalist id="pendidikan-list">
                    <option value="SD">
                    <option value="SMP/Sederajat">
                    <option value="SMA/SMK/Sederajat">
                    <option value="Diploma (D1/D2/D3/D4)">
                    <option value="Sarjana (S1)">
                    <option value="Magister (S2)">
                    <option value="Doktor (S3)">
                </datalist>
            </div>
        </fieldset>

        <fieldset>
            <legend>Data Bank</legend>
            <div class="form-row">
                <div class="form-group">
                    <label>Nama Bank</label>
                    <input list="bank-list" name="nama_bank" required placeholder="Cari nama bank">
                    <datalist id="bank-list">
                        <option value="BCA">
                        <option value="Bank Mandiri">
                        <option value="BNI">
                        <option value="BRI">
                        <option value="BSI (Bank Syariah Indonesia)">
                        <option value="CIMB Niaga">
                        <option value="Bank Kalsel">
                    </datalist>
                </div>
                <div class="form-group">
                    <label>Nomor Rekening</label>
                    <input type="number" name="no_rekening" required placeholder="Hanya angka">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Data Transaksi Keuangan</legend>
            <div class="form-group">
                <label>Tanggal Transaksi</label>
                <input type="date" name="tgl_transaksi" required>
            </div>
            
            <div class="form-group">
                <label>Uraian Transaksi</label>
                <input type="text" name="uraian" required placeholder="Contoh: Pembelian peralatan, Pembayaran biaya operasional">
            </div>

            <div class="form-group">
                <label>Jenis Transaksi</label>
                <div class="radio-buttons">
                    <input type="radio" id="debet-btn" name="jenis_transaksi" value="Debet" required>
                    <label for="debet-btn">Debet (Uang Masuk)</label>
                    
                    <input type="radio" id="kredit-btn" name="jenis_transaksi" value="Kredit">
                    <label for="kredit-btn">Kredit (Uang Keluar)</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nominal Debet (Rp)</label>
                    <input type="number" name="debet" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Nominal Kredit (Rp)</label>
                    <input type="number" name="kredit" value="0" min="0">
                </div>
            </div>
        </fieldset>

        <button type="submit" class="submit-btn" id="btn-kirim">Kirim Data ke Google Sheets</button>
    </form>
</div>

<script>
  // GANTI URL DI BAWAH DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
  const scriptURL = 'https://script.google.com/macros/s/AKfycbysV5tRqyddFNAhGsn-Ix4oYXXSCfZScX-YRcvvzyOwXoue11D7L8pLcAlI317PIkR7/exec'; 
  
  const form = document.forms['dataForm'];
  const btnKirim = document.getElementById('btn-kirim');

  form.addEventListener('submit', e => {
    e.preventDefault(); // Mencegah reload halaman
    
    // Validasi URL
    if(scriptURL === 'PASTE_URL_WEB_APP_DISINI') {
        alert("PERHATIAN: Anda belum memasukkan URL Web App Google Sheets di dalam file HTML!");
        return;
    }

    // Ubah status tombol
    btnKirim.innerHTML = "Sedang Mengirim...";
    btnKirim.disabled = true;

    // Kirim data menggunakan Fetch API
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        alert("Data berhasil disimpan ke Google Sheets!");
        form.reset(); // Kosongkan form setelah sukses
        btnKirim.innerHTML = "Kirim Data ke Google Sheets";
        btnKirim.disabled = false;
      })
      .catch(error => {
        alert("Terjadi kesalahan. Data gagal dikirim.");
        console.error('Error!', error.message);
        btnKirim.innerHTML = "Kirim Data ke Google Sheets";
        btnKirim.disabled = false;
      });
  });
</script>

</body>
</html>
