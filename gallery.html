<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | My Portfolio</title>
    <style>
        /* Reset & Base Style */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #111; /* Tema gelap agar foto lebih menonjol */
            color: #fff;
            padding-top: 80px;
        }

        /* Navigasi Modern */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 0;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #fff;
        }

        /* Header Halaman */
        .gallery-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .gallery-header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 5px;
        }

        .gallery-header p {
            color: #666;
            margin-top: 10px;
        }

        /* Grid Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 50px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-gap: 20px;
        }

        /* Item Gallery */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            height: 300px;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Overlay Efek */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay span {
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Hover Interaction */
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* Responsif */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            .gallery-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
