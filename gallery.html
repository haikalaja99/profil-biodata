<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Modern Split</title>
    <style>
        /* Reset Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: flex-end;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
        }

        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        /* Hero Header */
        .header-title {
            padding: 140px 50px 60px;
            text-align: left;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-title h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }

        .header-title p {
            color: #888;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* Split Section Style */
        .split-section {
            display: flex;
            min-height: 70vh;
            width: 100%;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }

        .split-section.reverse {
            flex-direction: row-reverse;
        }

        .split-image {
            flex: 1;
            min-width: 50%;
            background: #f9f9f9;
            overflow: hidden;
        }

        .split-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            display: block;
        }

        .split-image:hover img {
            transform: scale(1.05);
        }

        .split-content {
            flex: 1;
            min-width: 50%;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fff;
        }

        .split-content span {
            color: #ff4d4d;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .split-content h2 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .split-content p {
            color: #555;
            font-size: 1.05rem;
            max-width: 450px;
        }

        /* Footer */
        footer {
            padding: 80px 50px;
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 1px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .split-content {
                padding: 40px 20px;
                min-width: 100%;
            }
            .split-image {
                height: 50vh;
                min-width: 100%;
            }
            .header-title h1 {
                font-size: 2.2rem;
            }
            nav {
                padding: 20px;
                justify-content: center;
            }
            nav a {
                margin: 0 10px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="header-title">
        <h1>My <br> Gallery.</h1>
        <p>Dokumentasi gambar tempat tinggal saya.</p>
    </div>

    <div class="split-section">
        <div class="split-image">
            <img src="pp 2.jpeg" alt="Field Project">
        </div>
        <div class="split-content">
    </div>

    <div class="split-section reverse">
        <div class="split-image">
            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1000" alt="Digital Research">
        </div>
        <div class="split-content">
            <span>02 / Research</span>
            <h2>Digital Mapping</h2>
            <p>Implementasi teknologi GIS dalam memetakan potensi perikanan berkelanjutan di wilayah perairan Indonesia.</p>
        </div>
    </div>

    <footer>
        &copy; 2026 [Muhammad Fikri Haikal]. GALLERY.
    </footer>

</body>
</html>
